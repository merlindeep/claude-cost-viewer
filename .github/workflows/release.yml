name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # required to create GitHub releases and upload assets

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history so GoReleaser can build the changelog

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # The default GITHUB_TOKEN cannot push to another repository, so the
          # Homebrew formula is published to the tap (github.com/merlindeep/
          # homebrew-tap) using a separate token with write access to it.
          # Configure it as a repository secret named HOMEBREW_TAP_GITHUB_TOKEN.
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
