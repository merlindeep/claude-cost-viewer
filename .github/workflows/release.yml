name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # required to create GitHub releases and upload assets

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so GoReleaser can build the changelog

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # The Homebrew formula is generated but not published yet
          # (skip_upload: true in .goreleaser.yaml). When you are ready to
          # publish to the tap, create a HOMEBREW_TAP_GITHUB_TOKEN secret and
          # expose it here:
          # HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
